version: "3.9"

services:
  worldcup-predict:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup-predict
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
